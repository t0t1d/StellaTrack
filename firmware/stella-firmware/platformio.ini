; Stella Separation Awareness Firmware
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = stella

; --- Shared settings for Stella board ---
; Uses nano33ble board (same nRF52840 SoC + framework-arduino-mbed)
; but overrides variant to STELLA for correct pin mappings
[stella_common]
platform = nordicnrf52
board = nano33ble
board_build.variant = STELLA
framework = arduino
upload_port = COM*
monitor_port = COM*
monitor_speed = 115200
lib_deps =
    arduino-libraries/ArduinoBLE@^1.3.6
    https://github.com/Truesense-it/StellaUWB.git

; --- Arduino Stella ABX00131 full firmware ---
[env:stella]
extends = stella_common
build_flags =
    -DSTELLA_TARGET
    -Wall
    -Wextra
    -L.pio/libdeps/stella/StellaUWB/src/cortex-m4/fpv4-sp-d16-softfp
    -lStellaUWBLib

; --- Diagnostic build: NearbyDemo clone, no custom services ---
; Use to isolate UWB init failures: hardware vs firmware
[env:stella-diag]
extends = stella_common
build_flags =
    -DSTELLA_TARGET
    -DDIAG_NEARBY_ONLY
    -Wall
    -Wextra
    -L.pio/libdeps/stella-diag/StellaUWB/src/cortex-m4/fpv4-sp-d16-softfp
    -lStellaUWBLib

; --- Native desktop environment for TDD ---
[env:native]
platform = native
platform_packages = toolchain-gccmingw32
build_flags =
    -DNATIVE_TEST
    -std=c++14
    -Wall
    -Wextra
    -Itest/mocks
test_framework = unity
test_build_src = true
